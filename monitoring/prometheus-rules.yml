# Prometheus Alerting Rules for Plato TUI Enterprise

groups:
  # Application Health Rules
  - name: plato.application
    rules:
      - alert: PlatoServiceDown
        expr: up{job="plato"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Plato TUI service is down"
          description: "Plato TUI service has been down for more than 2 minutes in {{ $labels.kubernetes_namespace }}"
          runbook_url: "https://wiki.example.com/runbooks/plato-service-down"

      - alert: PlatoHighErrorRate
        expr: sum(rate(http_requests_total{job="plato",status=~"5.."}[5m])) / sum(rate(http_requests_total{job="plato"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Plato TUI high error rate"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          runbook_url: "https://wiki.example.com/runbooks/plato-high-error-rate"

      - alert: PlatoHighResponseTime
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="plato"}[5m])) by (le)) > 1.0
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Plato TUI high response time"
          description: "95th percentile response time is {{ $value }}s (threshold: 1s)"
          runbook_url: "https://wiki.example.com/runbooks/plato-high-response-time"

      - alert: PlatoLowThroughput
        expr: sum(rate(http_requests_total{job="plato"}[5m])) < 10
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Plato TUI low throughput"
          description: "Request rate is {{ $value }} req/s (threshold: 10 req/s)"

      - alert: PlatoMemoryUsageHigh
        expr: container_memory_usage_bytes{pod=~"plato-.*"} / container_spec_memory_limit_bytes > 0.9
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Plato TUI high memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }} in pod {{ $labels.pod }}"

      - alert: PlatoCPUUsageHigh
        expr: rate(container_cpu_usage_seconds_total{pod=~"plato-.*"}[5m]) > 0.8
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Plato TUI high CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }} in pod {{ $labels.pod }}"

      - alert: PlatoPodCrashLooping
        expr: increase(kube_pod_container_status_restarts_total{pod=~"plato-.*"}[15m]) > 3
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Plato TUI pod crash looping"
          description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last 15 minutes"

  # Database Health Rules
  - name: plato.database
    rules:
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL database has been down for more than 2 minutes"
          runbook_url: "https://wiki.example.com/runbooks/postgres-down"

      - alert: PostgreSQLTooManyConnections
        expr: pg_stat_activity_count > pg_settings_max_connections * 0.8
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "PostgreSQL too many connections"
          description: "{{ $value }} connections ({{ $value | humanizePercentage }} of max)"

      - alert: PostgreSQLSlowQueries
        expr: avg(pg_stat_statements_mean_time_seconds) > 1.0
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "Average query time is {{ $value }}s (threshold: 1s)"

      - alert: PostgreSQLDiskUsageHigh
        expr: (pg_database_size_bytes / (1024^3)) > 80
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "PostgreSQL database size is high"
          description: "Database size is {{ $value }}GB (threshold: 80GB)"

      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag_seconds > 300
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "PostgreSQL replication lag is high"
          description: "Replication lag is {{ $value }}s (threshold: 300s)"

  # Redis Cache Rules
  - name: plato.redis
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Redis cache is down"
          description: "Redis cache has been down for more than 2 minutes"
          runbook_url: "https://wiki.example.com/runbooks/redis-down"

      - alert: RedisMemoryUsageHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage is {{ $value | humanizePercentage }} (threshold: 90%)"

      - alert: RedisLowHitRatio
        expr: redis_keyspace_hits_total / (redis_keyspace_hits_total + redis_keyspace_misses_total) < 0.8
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis cache hit ratio is low"
          description: "Cache hit ratio is {{ $value | humanizePercentage }} (threshold: 80%)"

      - alert: RedisTooManyConnections
        expr: redis_connected_clients > 100
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis has too many connections"
          description: "{{ $value }} connections (threshold: 100)"

  # Infrastructure Rules
  - name: plato.infrastructure
    rules:
      - alert: NodeHighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 15m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Node high CPU usage"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: NodeHighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.85
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Node high memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      - alert: NodeDiskSpaceHigh
        expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes > 0.85
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Node disk space is high"
          description: "Disk usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}:{{ $labels.mountpoint }}"

      - alert: NodeDiskSpaceCritical
        expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes > 0.95
        for: 5m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Node disk space is critically high"
          description: "Disk usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}:{{ $labels.mountpoint }}"

      - alert: KubernetesNodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Kubernetes node is not ready"
          description: "Node {{ $labels.node }} has been not ready for more than 5 minutes"

      - alert: KubernetesPodNotRunning
        expr: kube_pod_status_phase{phase!="Running",pod=~"plato-.*"} > 0
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kubernetes pod not running"
          description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has been in {{ $labels.phase }} phase for more than 10 minutes"

  # Security Rules
  - name: plato.security
    rules:
      - alert: TLSCertificateExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 30
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "TLS certificate expiring soon"
          description: "TLS certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}"

      - alert: TLSCertificateExpired
        expr: probe_ssl_earliest_cert_expiry - time() <= 0
        for: 0m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "TLS certificate has expired"
          description: "TLS certificate for {{ $labels.instance }} has expired"

      - alert: UnauthorizedAccess
        expr: increase(nginx_ingress_controller_requests_total{status="401"}[5m]) > 50
        for: 0m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "High number of unauthorized access attempts"
          description: "{{ $value }} unauthorized access attempts in the last 5 minutes"

      - alert: SuspiciousActivity
        expr: increase(nginx_ingress_controller_requests_total{status=~"4..|5.."}[1m]) > 100
        for: 0m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "Suspicious activity detected"
          description: "{{ $value }} error requests in the last minute"

  # Business Metrics Rules
  - name: plato.business
    rules:
      - alert: LowUserActivity
        expr: sum(rate(plato_user_commands_total[1h])) < 100
        for: 30m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "Low user activity detected"
          description: "Command rate is {{ $value }} commands/hour (threshold: 100)"

      - alert: SessionTimeoutHigh
        expr: avg(plato_session_duration_seconds) > 3600
        for: 15m
        labels:
          severity: info
          team: product
        annotations:
          summary: "Average session duration is high"
          description: "Average session duration is {{ $value | humanizeDuration }}"

      - alert: CommandFailureRateHigh
        expr: sum(rate(plato_command_failures_total[5m])) / sum(rate(plato_commands_total[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "Command failure rate is high"
          description: "Command failure rate is {{ $value | humanizePercentage }} (threshold: 10%)"